<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Password Reset Code</title>
</head>
<body style="font-family: Arial, sans-serif; background-color: #f4f4f5; margin: 0; padding: 40px 20px;">
  <div style="max-width: 420px; margin: 0 auto; background: #ffffff; border-radius: 12px; padding: 40px 32px; text-align: center;">
    <div style="margin-bottom: 24px;">
      <div style="display: inline-block; background-color: hsl(222.2, 47.4%, 11.2%); border-radius: 12px; padding: 12px;">
        <span style="color: #ffffff; font-size: 20px; font-weight: bold;">📦</span>
      </div>
    </div>
    <h1 style="font-size: 20px; font-weight: 700; color: #18181b; margin: 0 0 8px;">Password Reset Code</h1>
    <p style="font-size: 14px; color: #71717a; margin: 0 0 28px;">Use the code below to reset your StockFlow password. This code expires in 10 minutes.</p>
    <div style="background-color: #f4f4f5; border-radius: 8px; padding: 20px; margin-bottom: 28px;">
      <span style="font-size: 32px; font-weight: 700; letter-spacing: 8px; color: #18181b;">{{ .Token }}</span>
    </div>
    <p style="font-size: 13px; color: #a1a1aa; margin: 0;">If you didn't request this, you can safely ignore this email.</p>
  </div>
</body>
</html>
